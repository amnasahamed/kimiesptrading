<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Mode Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-bg: #0a0a0f;
            --c-surface: #12121a;
            --c-surface-2: #1a1a25;
            --c-surface-3: #222230;
            --c-border: rgba(255,255,255,0.07);
            --c-text: #e2e8f0;
            --c-muted: #6b7280;
            --c-green: #22c55e;
            --c-green-dim: rgba(34,197,94,0.12);
            --c-red: #ef4444;
            --c-red-dim: rgba(239,68,68,0.12);
            --c-amber: #f59e0b;
            --c-amber-dim: rgba(245,158,11,0.12);
            --c-blue: #3b82f6;
            --c-blue-dim: rgba(59,130,246,0.12);
            --c-purple: #a855f7;
            --c-purple-dim: rgba(168,85,247,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--c-bg);
            color: var(--c-text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--c-surface);
            border-bottom: 1px solid var(--c-border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: var(--c-green-dim);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--c-text);
        }

        .header-subtitle {
            font-size: 0.75rem;
            color: var(--c-muted);
            margin-top: 1px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--c-muted);
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--c-border);
            background: var(--c-surface-2);
            transition: color 0.15s, border-color 0.15s;
        }

        .back-link:hover { color: var(--c-text); border-color: rgba(255,255,255,0.15); }

        /* Main layout */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--c-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .section-icon.green {
            background: var(--c-green-dim);
            border: 1px solid rgba(34,197,94,0.25);
        }

        .section-icon.blue {
            background: var(--c-blue-dim);
            border: 1px solid rgba(59,130,246,0.25);
        }

        .section-icon.amber {
            background: var(--c-amber-dim);
            border: 1px solid rgba(245,158,11,0.25);
        }

        .section-icon.purple {
            background: var(--c-purple-dim);
            border: 1px solid rgba(168,85,247,0.25);
        }

        .card-title {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--c-text);
        }

        .card-body {
            padding: 20px;
        }

        /* Stat cards row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--c-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .stat-value.green { color: var(--c-green); }
        .stat-value.blue { color: var(--c-blue); }
        .stat-value.amber { color: var(--c-amber); }
        .stat-value.purple { color: var(--c-purple); }

        .stat-sub {
            font-size: 0.75rem;
            color: var(--c-muted);
        }

        /* Status area */
        .status-area {
            padding: 14px 20px;
            border-radius: 10px;
            background: var(--c-surface-2);
            border: 1px solid var(--c-border);
            font-size: 0.875rem;
            min-height: 48px;
            display: flex;
            align-items: center;
        }

        .success { color: var(--c-green); }
        .error { color: var(--c-red); }
        .info { color: var(--c-blue); }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--c-green);
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--c-surface-2);
            color: var(--c-text);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid var(--c-border);
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .btn-ghost:hover {
            border-color: rgba(255,255,255,0.15);
            background: var(--c-surface-3);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .badge-green { background: var(--c-green-dim); color: var(--c-green); border: 1px solid rgba(34,197,94,0.2); }
        .badge-red { background: var(--c-red-dim); color: var(--c-red); border: 1px solid rgba(239,68,68,0.2); }
        .badge-blue { background: var(--c-blue-dim); color: var(--c-blue); border: 1px solid rgba(59,130,246,0.2); }
        .badge-amber { background: var(--c-amber-dim); color: var(--c-amber); border: 1px solid rgba(245,158,11,0.2); }
        .badge-muted { background: rgba(107,114,128,0.12); color: var(--c-muted); border: 1px solid rgba(107,114,128,0.2); }

        /* Table */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: var(--c-surface-2);
            color: var(--c-muted);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 11px 16px;
            text-align: left;
            border-bottom: 1px solid var(--c-border);
        }

        tbody td {
            padding: 12px 16px;
            font-size: 0.875rem;
            color: var(--c-text);
            border-bottom: 1px solid var(--c-border);
            vertical-align: middle;
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody tr:hover td { background: var(--c-surface-2); }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
        }

        .symbol-cell {
            font-weight: 600;
            color: var(--c-text);
        }

        /* Raw JSON section */
        details {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: 16px;
            overflow: hidden;
        }

        summary {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--c-text);
            list-style: none;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s;
        }

        details[open] summary {
            border-bottom-color: var(--c-border);
        }

        summary::-webkit-details-marker { display: none; }

        .summary-chevron {
            margin-left: auto;
            color: var(--c-muted);
            font-size: 12px;
            transition: transform 0.2s;
        }

        details[open] .summary-chevron { transform: rotate(180deg); }

        .details-body { padding: 20px; }

        pre {
            background: #080810;
            border: 1px solid var(--c-border);
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #9ca3af;
            padding: 16px;
            overflow-x: auto;
            white-space: pre;
            line-height: 1.6;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--c-muted);
        }

        .empty-state-icon { font-size: 2rem; margin-bottom: 10px; }
        .empty-state-text { font-size: 0.875rem; }

        /* Hidden stat cards (filled by JS) */
        #stat-total .stat-value,
        #stat-recent .stat-value,
        #stat-executed .stat-value,
        #stat-pending .stat-value {
            transition: color 0.3s;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="header-icon">🚀</div>
            <div>
                <div class="header-title">Turbo Mode Test</div>
                <div class="header-subtitle">API connection &amp; signal monitor</div>
            </div>
        </div>
        <a href="/" class="back-link">
            &#8592; Dashboard
        </a>
    </header>

    <main class="main">

        <!-- Button row -->
        <div class="btn-row">
            <button class="btn-primary" onclick="testAPI()">&#9889; Test API Connection</button>
            <button class="btn-ghost" onclick="clearCache()">&#8635; Clear Cache &amp; Reload</button>
        </div>

        <!-- Status -->
        <div id="status" class="status-area">
            <span class="info">Initialising&hellip;</span>
        </div>

        <!-- Stats row -->
        <div class="stats-row">
            <div class="stat-card" id="stat-total">
                <div class="stat-label">Total Items</div>
                <div class="stat-value blue" id="val-total">—</div>
                <div class="stat-sub">in queue</div>
            </div>
            <div class="stat-card" id="stat-recent">
                <div class="stat-label">Recent Items</div>
                <div class="stat-value purple" id="val-recent">—</div>
                <div class="stat-sub">last batch</div>
            </div>
            <div class="stat-card" id="stat-executed">
                <div class="stat-label">Executed</div>
                <div class="stat-value green" id="val-executed">—</div>
                <div class="stat-sub">from counts</div>
            </div>
            <div class="stat-card" id="stat-pending">
                <div class="stat-label">Pending</div>
                <div class="stat-value amber" id="val-pending">—</div>
                <div class="stat-sub">queued + monitoring</div>
            </div>
        </div>

        <!-- Signals table card -->
        <div class="card" id="signals-card">
            <div class="card-header">
                <div class="card-header-left">
                    <div class="section-icon green">&#128680;</div>
                    <div class="card-title">Recent Signals</div>
                </div>
                <span id="signal-count-badge"></span>
            </div>
            <div id="results">
                <div class="empty-state">
                    <div class="empty-state-icon">&#128247;</div>
                    <div class="empty-state-text">Run the API test to load signals</div>
                </div>
            </div>
        </div>

        <!-- Raw JSON collapsible -->
        <details id="raw-details">
            <summary>
                <div class="section-icon blue" style="width:28px;height:28px;border-radius:8px;font-size:13px;">{ }</div>
                Raw API Response
                <span class="summary-chevron">&#9660;</span>
            </summary>
            <div class="details-body">
                <pre id="raw-pre">No data yet.</pre>
            </div>
        </details>

    </main>

    <script>
        async function testAPI() {
            const status = document.getElementById('status');
            const results = document.getElementById('results');

            status.innerHTML = '<span class="info">&#9889; Testing&hellip;</span>';
            results.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#8987;</div><div class="empty-state-text">Fetching data&hellip;</div></div>';

            try {
                const response = await fetch('/api/turbo/status?_=' + Date.now());
                const data = await response.json();

                if (response.ok) {
                    status.innerHTML = `<span class="success">&#10003; API OK &mdash; HTTP ${response.status} &mdash; Status: <strong>${data.status}</strong></span>`;

                    // Fill stat cards
                    document.getElementById('val-total').textContent = data.counts?.total ?? 0;
                    document.getElementById('val-recent').textContent = data.recent_items?.length ?? 0;
                    document.getElementById('val-executed').textContent = data.counts?.executed ?? 0;
                    const pending = (data.counts?.queued ?? 0) + (data.counts?.monitoring ?? 0);
                    document.getElementById('val-pending').textContent = pending;

                    // Raw JSON
                    document.getElementById('raw-pre').textContent = JSON.stringify(data, null, 2);

                    if (data.recent_items && data.recent_items.length > 0) {
                        const items = data.recent_items.slice().reverse();

                        // Badge in card header
                        document.getElementById('signal-count-badge').innerHTML =
                            `<span class="badge badge-blue">${items.length} signals</span>`;

                        let html = '<div class="table-wrap"><table>';
                        html += '<thead><tr>';
                        html += '<th>Time</th><th>Symbol</th><th>Direction</th><th>Status</th><th>Price</th>';
                        html += '</tr></thead><tbody>';

                        items.forEach(item => {
                            const time = item.timestamp ? new Date(item.timestamp).toLocaleTimeString() : '-';
                            const statusBadge = getStatusBadge(item.status);
                            html += `<tr>
                                <td class="mono">${time}</td>
                                <td class="symbol-cell">${item.symbol}</td>
                                <td>${item.direction}</td>
                                <td>${statusBadge}</td>
                                <td class="mono">${item.alert_price ? '&#8377;' + item.alert_price : '-'}</td>
                            </tr>`;
                        });

                        html += '</tbody></table></div>';
                        results.innerHTML = html;
                    } else {
                        document.getElementById('signal-count-badge').innerHTML = '';
                        results.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128274;</div><div class="empty-state-text">No items found in queue</div></div>';
                    }
                } else {
                    status.innerHTML = `<span class="error">&#10007; API Error &mdash; HTTP ${response.status}</span>`;
                    results.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#10060;</div><div class="empty-state-text">Server returned an error</div></div>';
                    document.getElementById('raw-pre').textContent = await response.text();
                }
            } catch (err) {
                status.innerHTML = `<span class="error">&#10007; Connection Error</span>`;
                results.innerHTML = `<div class="empty-state"><div class="empty-state-icon">&#128268;</div><div class="empty-state-text">${err.message}<br><small>Make sure the server is running on localhost:8000</small></div></div>`;
            }
        }

        function getStatusBadge(status) {
            switch (status) {
                case 'EXECUTED':      return `<span class="badge badge-green">EXECUTED</span>`;
                case 'TREND_MISMATCH':return `<span class="badge badge-red">TREND_MISMATCH</span>`;
                case 'QUEUED':        return `<span class="badge badge-blue">QUEUED</span>`;
                case 'MONITORING':    return `<span class="badge badge-amber">MONITORING</span>`;
                default:              return `<span class="badge badge-muted">${status || '-'}</span>`;
            }
        }

        function clearCache() {
            location.reload(true);
        }

        // Auto-test on load
        window.onload = testAPI;
    </script>
</body>
</html>
