<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Debug</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; 
            padding: 20px; 
            background: #1a1a1a; 
            color: #0f0; 
            margin: 0;
            line-height: 1.6;
        }
        h1 { 
            font-size: 1.5rem; 
            margin-bottom: 1rem;
            word-break: break-word;
        }
        pre { 
            background: #000; 
            padding: 15px; 
            overflow: auto; 
            max-height: 400px; 
            border-radius: 8px;
            font-size: 0.875rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .error { color: #f00; }
        .success { color: #0f0; }
        #status { 
            background: #0d0d0d; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 640px) {
            body {
                padding: 10px;
            }
            h1 {
                font-size: 1.25rem;
            }
            pre {
                padding: 10px;
                font-size: 0.75rem;
                max-height: 300px;
            }
            #status {
                padding: 10px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <h1>Dashboard Debug</h1>
    <div id="status">Loading...</div>
    <h2>API Response:</h2>
    <pre id="output"></pre>
    
    <script>
        async function test() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            try {
                const cacheBuster = Date.now();
                status.innerHTML = 'Fetching trades...';
                
                const resp = await fetch(`/api/trades?_=${cacheBuster}`);
                status.innerHTML += `<br>Status: ${resp.status}`;
                
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }
                
                const trades = await resp.json();
                status.innerHTML += `<br><span class="success">Got ${trades.length} trades</span>`;
                output.textContent = JSON.stringify(trades, null, 2);
                
            } catch (err) {
                status.innerHTML += `<br><span class="error">Error: ${err.message}</span>`;
                console.error(err);
            }
        }
        
        test();
    </script>
</body>
</html>
