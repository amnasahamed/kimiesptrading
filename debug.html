<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Debug</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-bg: #0a0a0f;
            --c-surface: #12121a;
            --c-surface-2: #1a1a25;
            --c-surface-3: #222230;
            --c-border: rgba(255,255,255,0.07);
            --c-text: #e2e8f0;
            --c-muted: #6b7280;
            --c-green: #22c55e;
            --c-green-dim: rgba(34,197,94,0.12);
            --c-red: #ef4444;
            --c-red-dim: rgba(239,68,68,0.12);
            --c-amber: #f59e0b;
            --c-amber-dim: rgba(245,158,11,0.12);
            --c-blue: #3b82f6;
            --c-blue-dim: rgba(59,130,246,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--c-bg);
            color: var(--c-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(18,18,26,0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--c-border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .section-icon.blue {
            background: var(--c-blue-dim);
            border: 1px solid rgba(59,130,246,0.25);
        }

        .header-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--c-text);
            letter-spacing: -0.01em;
        }

        .header-sub {
            font-size: 0.75rem;
            color: var(--c-muted);
            margin-top: 1px;
        }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--c-muted);
            background: transparent;
            border: 1px solid var(--c-border);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.15s, background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .btn-ghost:hover {
            color: var(--c-text);
            background: var(--c-surface-2);
            border-color: rgba(255,255,255,0.14);
        }

        /* ── Layout ── */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        /* ── Card ── */
        .card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--c-text);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .card-inner {
            background: var(--c-surface-2);
            border: 1px solid var(--c-border);
            border-radius: 10px;
            padding: 16px;
        }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-green {
            background: var(--c-green-dim);
            color: var(--c-green);
            border: 1px solid rgba(34,197,94,0.25);
        }

        .badge-red {
            background: var(--c-red-dim);
            color: var(--c-red);
            border: 1px solid rgba(239,68,68,0.25);
        }

        .badge-amber {
            background: var(--c-amber-dim);
            color: var(--c-amber);
            border: 1px solid rgba(245,158,11,0.25);
        }

        .badge-blue {
            background: var(--c-blue-dim);
            color: var(--c-blue);
            border: 1px solid rgba(59,130,246,0.25);
        }

        /* ── Status card ── */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background: var(--c-surface-2);
            border: 1px solid var(--c-border);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--c-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--c-text);
            line-height: 1;
        }

        .stat-value.green { color: var(--c-green); }
        .stat-value.red   { color: var(--c-red); }
        .stat-value.blue  { color: var(--c-blue); }

        /* ── Spinner ── */
        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--c-blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            flex-shrink: 0;
        }

        /* ── Status message row ── */
        .status-msg {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--c-muted);
            min-height: 24px;
        }

        .status-msg.error-msg { color: var(--c-red); }
        .status-msg.success-msg { color: var(--c-green); }

        /* ── JSON output ── */
        .json-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 7px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--c-muted);
            background: var(--c-surface-3);
            border: 1px solid var(--c-border);
            cursor: pointer;
            transition: color 0.15s, background 0.15s;
        }

        .btn-copy:hover {
            color: var(--c-text);
            background: rgba(255,255,255,0.06);
        }

        .btn-copy.copied {
            color: var(--c-green);
            border-color: rgba(34,197,94,0.3);
        }

        pre#output {
            background: #080810;
            border: 1px solid var(--c-border);
            border-radius: 10px;
            padding: 20px;
            overflow: auto;
            max-height: 480px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #a5d6a7;
            margin: 0;
        }

        pre#output:empty::after {
            content: 'No data yet…';
            color: var(--c-muted);
            font-style: italic;
        }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            .header { padding: 0 16px; }
            .main { padding: 20px 16px 48px; }
            .card { padding: 18px; }
            .status-grid { grid-template-columns: 1fr 1fr; }
            .stat-value { font-size: 1.25rem; }
        }

        @media (max-width: 420px) {
            .status-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- ── Header ── -->
    <header class="header">
        <div class="header-left">
            <div class="section-icon blue">🔍</div>
            <div>
                <div class="header-title">API Debug</div>
                <div class="header-sub">GET /api/trades</div>
            </div>
        </div>
        <a href="/dashboard" class="btn-ghost">
            ← Dashboard
        </a>
    </header>

    <!-- ── Main ── -->
    <main class="main">

        <!-- Status card -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Request Status</span>
                <span id="state-badge" class="badge badge-amber">⏳ Pending</span>
            </div>

            <div class="status-grid">
                <div class="stat-box">
                    <span class="stat-label">State</span>
                    <div id="status" class="status-msg">
                        <span class="spinner"></span> Initialising…
                    </div>
                </div>
                <div class="stat-box">
                    <span class="stat-label">HTTP Status</span>
                    <span id="http-code" class="stat-value blue">—</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Trade Count</span>
                    <span id="trade-count" class="stat-value">—</span>
                </div>
            </div>
        </div>

        <!-- JSON output card -->
        <div class="card">
            <div class="json-header">
                <span class="card-title">API Response</span>
                <button class="btn-copy" id="copy-btn" onclick="copyJSON()">⎘ Copy JSON</button>
            </div>
            <pre id="output"></pre>
        </div>

    </main>

    <script>
        /* ── UI helpers (new) ── */
        function setStateBadge(type, label) {
            const b = document.getElementById('state-badge');
            b.className = 'badge';
            if (type === 'loading') { b.classList.add('badge-amber'); }
            else if (type === 'success') { b.classList.add('badge-green'); }
            else { b.classList.add('badge-red'); }
            b.textContent = label;
        }

        function copyJSON() {
            const text = document.getElementById('output').textContent;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = '✓ Copied';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '⎘ Copy JSON';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        /* ── Original fetch logic (unchanged) ── */
        async function test() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');

            try {
                const cacheBuster = Date.now();
                status.innerHTML = 'Fetching trades...';

                const resp = await fetch(`/api/trades?_=${cacheBuster}`);
                status.innerHTML += `<br>Status: ${resp.status}`;

                /* Update new UI elements */
                document.getElementById('http-code').textContent = resp.status;

                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }

                const trades = await resp.json();
                status.innerHTML += `<br><span class="success">Got ${trades.length} trades</span>`;
                output.textContent = JSON.stringify(trades, null, 2);

                /* Update new UI elements */
                document.getElementById('trade-count').textContent = trades.length;
                document.getElementById('trade-count').className = 'stat-value green';
                setStateBadge('success', '✓ Success');
                status.className = 'status-msg success-msg';

            } catch (err) {
                status.innerHTML += `<br><span class="error">Error: ${err.message}</span>`;
                console.error(err);

                /* Update new UI elements */
                setStateBadge('error', '✕ Error');
                status.className = 'status-msg error-msg';
                document.getElementById('http-code').className = 'stat-value red';
            }
        }

        test();
    </script>

</body>
</html>
